<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone - Apple</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="sticky-header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <i class="fab fa-apple"></i>
                </div>
                <ul class="nav-menu">
                    <li><a href="#">商店</a></li>
                    <li><a href="#">Mac</a></li>
                    <li><a href="#">iPad</a></li>
                    <li><a href="#">iPhone</a></li>
                    <li><a href="#">Watch</a></li>
                    <li><a href="#">AirPods</a></li>
                    <li><a href="#">支持</a></li>
                </ul>
                <div class="nav-icons">
                    <i class="fas fa-search"></i>
                    <i class="fas fa-shopping-bag"></i>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero 首屏区域 -->
    <section class="hero-section">
        <div class="container">
            <div class="hero-content">
                <h1>iPhone</h1>
                <p>创新，尽在指尖</p>
                <div class="hero-buttons">
                    <a href="#" class="btn-primary">进一步了解</a>
                    <a href="#" class="btn-secondary">选购 iPhone</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 产品展示区 -->
    <section class="product-section">
        <div class="container">
            <div class="product-grid">
                <div class="product-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=iPhone%2015%20Pro%20in%20space%20black%20color%2C%203D%20rendering%2C%20high%20quality%2C%20soft%20lighting%2C%20white%20background&image_size=landscape_16_9" alt="iPhone 15 Pro">
                </div>
                <div class="product-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=iPhone%2015%20Pro%20in%20natural%20titanium%20color%2C%203D%20rendering%2C%20high%20quality%2C%20soft%20lighting%2C%20white%20background&image_size=landscape_16_9" alt="iPhone 15 Pro">
                </div>
                <div class="product-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=iPhone%2015%20Pro%20in%20blue%20titanium%20color%2C%203D%20rendering%2C%20high%20quality%2C%20soft%20lighting%2C%20white%20background&image_size=landscape_16_9" alt="iPhone 15 Pro">
                </div>
                <div class="product-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=iPhone%2015%20Pro%20in%20white%20titanium%20color%2C%203D%20rendering%2C%20high%20quality%2C%20soft%20lighting%2C%20white%20background&image_size=landscape_16_9" alt="iPhone 15 Pro">
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
